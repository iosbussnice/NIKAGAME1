workflows:
  ios-unity-build:
    name: iOS Unity Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      # تأكد من استخدام نسخة Xcode مستقرة موجودة فعلياً
      xcode: 26 
    scripts:
      - name: Build Xcode Project
        script: |
          # تنظيف المشروع قبل البناء لضمان عدم وجود ملفات تالفة
          xcodebuild clean -project "Unity-iPhone.xcodeproj" -scheme "Unity-iPhone"
          
          # بناء الـ Archive (التأكد من استخدام المسار الحالي $PWD)
          xcodebuild archive -project "Unity-iPhone.xcodeproj" -scheme "Unity-iPhone" -sdk iphoneos -archivePath $PWD/build/Unity-iPhone.xcarchive
          
          # تصدير ملف IPA باستخدام الملف الذي أنشأته
          xcodebuild -exportArchive -archivePath $PWD/build/Unity-iPhone.xcarchive -exportPath $PWD/build -exportOptionsPlist exportOptions.plist
    artifacts:
      - build/*.ipa
