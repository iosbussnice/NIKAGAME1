workflows:
  ios-unity-build:
    name: iOS Unity Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Build Xcode Project
        script: |
          # استعمال -project عوض -workspace
          xcodebuild -project "Wispwood.xcodeproj" -scheme "Wispwood" -sdk iphoneos archive -archivePath $PWD/build/Wispwood.xcarchive
          
          # خطوة الـ Export
          xcodebuild -exportArchive -archivePath $PWD/build/Wispwood.xcarchive -exportPath $PWD/build -exportOptionsPlist exportOptions.plist
    artifacts:
      - build/*.ipa
