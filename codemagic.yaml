workflows:
  ios-release:
    name: iOS Release

    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.Wispwood.GlowRunner.stershicgames

      vars:
        XCODE_PROJECT: Unity-iPhone.xcodeproj
        XCODE_SCHEME: Unity-iPhone

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
          include: true
           

    scripts:
      - name: Show Xcode version
        script: |
          xcodebuild -version

      - name: List project schemes
        script: |
          xcodebuild -list -project "$XCODE_PROJECT"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
